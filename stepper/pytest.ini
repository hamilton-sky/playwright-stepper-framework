[pytest]
# 1. Asyncio Scoping (Crucial for Playwright + Data-driven tests)
# Use 'session' so the browser and the 6+ test cases share one event loop.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# 2. Combined Options
# Merge your allure and logging flags here. 
# -s allows you to see the "Planned X steps" printouts in real-time.
addopts = --alluredir=reports/allure-results -s --log-cli-level=INFO

# 3. Live Logging Configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
log_cli_date_format = %H:%M:%S