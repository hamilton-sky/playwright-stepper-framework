name: CI

on:
  push:
    branches: [main, "hamilton/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Fast gate: unit tests (no browser, no network) ────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest stepper/tests/unit/ -v --junitxml=reports/junit-unit.xml
        env:
          PYTHONPATH: stepper

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-unit
          path: reports/junit-unit.xml

  # ── Integration tests (real browser, headless) ────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Download MiniLM model
        run: python stepper/download_models.py
        env:
          PYTHONPATH: stepper

      - name: Run smoke workflow (OpenLibrary)
        run: >
          python stepper/main.py
          --workflow stepper/sites/openlibrary/workflows/ol_smoke_test.json
          --ci
          --ci-output reports/ci-ol-smoke.json
        env:
          PYTHONPATH: stepper
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run smoke workflow (SauceDemo)
        run: >
          python stepper/main.py
          --workflow stepper/sites/saucedemo/workflows/sd_smoke_test.json
          --ci
          --ci-output reports/ci-sd-smoke.json
        env:
          PYTHONPATH: stepper
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run stepper integration tests
        run: pytest stepper/tests/ --ignore=stepper/tests/unit -v --junitxml=reports/junit-integration.xml
        env:
          PYTHONPATH: stepper
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration
          path: reports/junit-integration.xml

      - name: Upload CI summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summaries
          path: reports/ci-*.json
